{{define "proxies.html"}}
<!DOCTYPE html>
<html lang="en" data-i18n-title="page_title_proxies">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proxies — MTProxy Panel</title>
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        .engine-toggle { display: flex; gap: 8px; margin-top: 6px; }
        .engine-btn {
            flex: 1; padding: 10px 12px; border: 2px solid var(--border); border-radius: 8px;
            background: var(--bg-primary); cursor: pointer; text-align: center; transition: all .2s;
        }
        .engine-btn:hover { border-color: var(--accent); }
        .engine-btn.active { border-color: var(--accent); background: rgba(59,130,246,.08); }
        .engine-btn .engine-name { font-weight: 700; font-size: 14px; }
        .engine-btn .engine-lang { font-size: 11px; opacity: .6; }
        .live-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
        .live-dot.online { background: var(--success); box-shadow: 0 0 6px var(--success); }
        .live-dot.offline { background: var(--text-secondary); opacity: .4; }
        .live-badge {
            display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px;
            border-radius: 4px; font-size: 11px; font-weight: 600;
            background: rgba(16,185,129,.1); color: var(--success);
        }
        .ip-list { font-size: 11px; color: var(--text-secondary); max-width: 150px; word-break: break-all; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>

    <div class="sidebar">
        <div class="sidebar-brand"><i class="fas fa-paper-plane"></i><div><div class="name" data-i18n="app_name"></div><div class="ver">v1.2.0</div></div></div>
        <nav>
            <a href="/panel"><i class="fas fa-chart-line"></i> <span data-i18n="nav_dashboard"></span></a>
            <a href="/panel/proxies" class="active"><i class="fas fa-server"></i> <span data-i18n="nav_proxies"></span></a>
            <a href="/panel/settings"><i class="fas fa-cog"></i> <span data-i18n="nav_settings"></span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="lang-switcher">
                <button onclick="setLang('en')" class="lang-btn" data-lang="en">EN</button>
                <button onclick="setLang('ru')" class="lang-btn" data-lang="ru">RU</button>
                <button onclick="setLang('zh')" class="lang-btn" data-lang="zh">ZH</button>
            </div>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt mr-2"></i><span data-i18n="btn_logout"></span></a>
        </div>
    </div>

    <div class="main">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="page-title" data-i18n="proxies_title"></h1>
                <p class="page-sub" style="margin-bottom:0" data-i18n="proxies_subtitle"></p>
            </div>
            <button class="btn btn-primary" onclick="showCreateModal()"><i class="fas fa-plus mr-1"></i> <span data-i18n="btn_new_proxy"></span></button>
        </div>
        <div id="proxies-list"><p style="color:var(--text-secondary)" data-i18n="loading"></p></div>
    </div>

    <!-- Create Proxy Modal -->
    <div id="createModal" class="modal-overlay">
        <div class="modal">
            <h3 data-i18n="modal_new_proxy"></h3>
            <div class="mb-3"><label data-i18n="label_name"></label><input type="text" id="proxyName" data-i18n-placeholder="placeholder_proxy_name"></div>
            <div class="mb-3"><label data-i18n="label_port"></label><input type="number" id="proxyPort" value="10443"></div>
            <div class="mb-3"><label data-i18n="label_fake_tls_domain"></label><input type="text" id="proxyDomain" value="google.com"></div>
            <div class="mb-3"><label data-i18n="label_ad_tag"></label><input type="text" id="proxyAdTag" data-i18n-placeholder="placeholder_ad_tag"></div>
            <div class="mb-4">
                <label data-i18n="label_proxy_engine"></label>
                <div class="engine-toggle">
                    <div class="engine-btn active" data-engine="official" onclick="selectEngine(this)">
                        <div class="engine-name" data-i18n="engine_official"></div>
                        <div class="engine-lang" data-i18n="engine_official_lang"></div>
                    </div>
                    <div class="engine-btn" data-engine="telemt" onclick="selectEngine(this)">
                        <div class="engine-name" data-i18n="engine_telemt"></div>
                        <div class="engine-lang" data-i18n="engine_telemt_lang"></div>
                    </div>
                </div>
                <input type="hidden" id="proxyBackend" value="official">
            </div>
            <div class="flex justify-between gap-2" style="justify-content:flex-end">
                <button class="btn btn-outline" onclick="hideModal('createModal')"><span data-i18n="btn_cancel"></span></button>
                <button class="btn btn-primary" onclick="createProxy()"><span data-i18n="btn_create"></span></button>
            </div>
        </div>
    </div>

    <!-- Add Client Modal -->
    <div id="addClientModal" class="modal-overlay">
        <div class="modal">
            <h3 data-i18n="modal_add_client"></h3>
            <input type="hidden" id="clientProxyId">
            <div class="mb-3"><label data-i18n="label_client_name"></label><input type="text" id="clientName" data-i18n-placeholder="placeholder_client_name"></div>
            <div class="mb-3"><label data-i18n="label_traffic_limit_gb"></label><input type="number" id="clientTrafficLimit" value="0" step="0.1" min="0"></div>
            <div class="mb-4">
                <label data-i18n="label_expiry_days"></label>
                <input type="number" id="clientExpiry" value="0" min="0">
                <div class="flex gap-2 mt-2">
                    <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('clientExpiry').value=7">7д</button>
                    <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('clientExpiry').value=30">30д</button>
                    <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('clientExpiry').value=90">90д</button>
                    <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('clientExpiry').value=365">365д</button>
                </div>
            </div>
            <div class="flex gap-2" style="justify-content:flex-end">
                <button class="btn btn-outline" onclick="hideModal('addClientModal')"><span data-i18n="btn_cancel"></span></button>
                <button class="btn btn-primary" onclick="addClient()"><span data-i18n="btn_add"></span></button>
            </div>
        </div>
    </div>

    <!-- Edit Client Modal -->
    <div id="editClientModal" class="modal-overlay">
        <div class="modal">
            <h3 data-i18n="modal_edit_client"></h3>
            <input type="hidden" id="editClientProxyId">
            <input type="hidden" id="editClientId">
            <input type="hidden" id="editClientTrafficLimitOrigBytes" value="0">
            <div class="mb-3"><label data-i18n="label_client_name"></label><input type="text" id="editClientName"></div>
            <div class="mb-3"><label data-i18n="label_traffic_limit_gb"></label><input type="number" id="editClientTrafficLimit" value="0" step="0.1" min="0"></div>
            <div class="mb-4">
                <label data-i18n="label_expiry_days"></label>
                <input type="number" id="editClientExpiry" value="0" min="-1">
                <p id="editClientExpiryInfo" class="mt-2" style="font-size:12px;color:var(--text-secondary)"></p>
                <div class="flex gap-2 mt-2">
                    <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('editClientExpiry').value=7">7д</button>
                    <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('editClientExpiry').value=30">30д</button>
                    <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('editClientExpiry').value=90">90д</button>
                    <button type="button" class="btn btn-outline btn-sm" onclick="document.getElementById('editClientExpiry').value=-1">∞</button>
                </div>
            </div>
            <div class="flex gap-2" style="justify-content:flex-end">
                <button class="btn btn-outline" onclick="hideModal('editClientModal')"><span data-i18n="btn_cancel"></span></button>
                <button class="btn btn-primary" onclick="saveClient()"><span data-i18n="btn_save"></span></button>
            </div>
        </div>
    </div>

    <!-- Edit Proxy Modal -->
    <div id="editModal" class="modal-overlay">
        <div class="modal">
            <h3 data-i18n="modal_edit_proxy"></h3>
            <input type="hidden" id="editProxyId">
            <div class="mb-3"><label data-i18n="label_name"></label><input type="text" id="editProxyName"></div>
            <div class="mb-3"><label data-i18n="label_port"></label><input type="number" id="editProxyPort"></div>
            <div class="mb-3"><label data-i18n="label_fake_tls_domain"></label><input type="text" id="editProxyDomain"></div>
            <div class="mb-3"><label data-i18n="label_ad_tag"></label><input type="text" id="editProxyAdTag" data-i18n-placeholder="placeholder_ad_tag"></div>
            <div class="mb-4"><label data-i18n="label_traffic_limit"></label><input type="number" id="editProxyTrafficLimit" value="0"></div>
            <div class="flex gap-2" style="justify-content:flex-end">
                <button class="btn btn-outline" onclick="hideModal('editModal')"><span data-i18n="btn_cancel"></span></button>
                <button class="btn btn-primary" onclick="saveProxy()"><span data-i18n="btn_save"></span></button>
            </div>
        </div>
    </div>

    <!-- Logs Modal -->
    <div id="logsModal" class="modal-overlay">
        <div class="modal" style="max-width:700px">
            <div class="flex items-center justify-between mb-4">
                <h3 style="margin:0" data-i18n="modal_container_logs"></h3>
                <button class="btn btn-outline btn-sm" onclick="hideModal('logsModal')"><span data-i18n="btn_close"></span></button>
            </div>
            <pre id="logsContent"></pre>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
    applyI18n();
    let liveData = {};
    let proxyMeta = {};
    let proxyData = {};
    let clientCache = {};
    let initialized = false;
    let openSections = new Set();

    function toggleClients(proxyId) {
        const el = document.getElementById(`clients-wrap-${proxyId}`);
        const icon = document.getElementById(`chevron-${proxyId}`);
        if (openSections.has(proxyId)) {
            openSections.delete(proxyId);
            el.style.display = 'none';
            icon.className = 'fas fa-chevron-right';
        } else {
            openSections.add(proxyId);
            el.style.display = 'block';
            icon.className = 'fas fa-chevron-down';
        }
    }

    function onLangChange() { applyI18n(); refresh(); }

    function formatExpiry(unix) {
        if (!unix || unix === 0) return t('expiry_permanent');
        const now = Math.floor(Date.now() / 1000);
        if (unix < now) return `<span style="color:var(--danger)">${t('expiry_expired')}</span>`;
        const d = new Date(unix * 1000);
        const dateStr = d.toLocaleDateString(localStorage.getItem('lang') || 'en', { day:'2-digit', month:'2-digit', year:'numeric' });
        return t('expiry_until', {date: dateStr});
    }

    function formatRelativeTime(unix) {
        if (!unix || unix === 0) return t('time_never');
        const diff = Math.floor(Date.now() / 1000) - unix;
        if (diff < 60) return t('time_just_now');
        if (diff < 3600) return t('time_min_ago', {n: Math.floor(diff/60)});
        if (diff < 86400) return t('time_hour_ago', {n: Math.floor(diff/3600)});
        return t('time_day_ago', {n: Math.floor(diff/86400)});
    }

    function selectEngine(el) {
        el.parentElement.querySelectorAll('.engine-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('proxyBackend').value = el.dataset.engine;
    }

    async function loadProxies() {
        try {
            const proxies = await api('/api/proxies');
            const el = document.getElementById('proxies-list');
            if (proxies.length === 0) {
                el.innerHTML = `<div class="card text-center py-12">
                    <i class="fas fa-server text-4xl mb-4" style="color:var(--text-secondary)"></i>
                    <p class="text-lg mb-2">${t('no_proxies_yet')}</p>
                    <p style="color:var(--text-secondary)" class="mb-4">${t('no_proxies_create_first')}</p>
                    <button class="btn btn-primary" onclick="showCreateModal()"><i class="fas fa-plus mr-1"></i> ${t('btn_create_proxy')}</button>
                </div>`;
                return;
            }
            let html = '';
            for (const p of proxies) {
                const running = p.status.running;
                const badge = running ? `<span class="badge badge-success">${t('status_running')}</span>` : `<span class="badge badge-danger">${t('status_stopped')}</span>`;
                const isTelemt = p.backend === 'telemt';
                const engineBadge = isTelemt
                    ? '<span style="color:#ef7744;font-weight:600">Rust</span>'
                    : '<span style="color:var(--accent);font-weight:600">C</span>';

                const controls = running
                    ? `<button class="btn btn-outline btn-sm" onclick="proxyAction(${p.id},'restart')"><i class="fas fa-redo"></i></button>
                       <button class="btn btn-danger btn-sm" onclick="proxyAction(${p.id},'stop')"><i class="fas fa-stop"></i></button>`
                    : `<button class="btn btn-success btn-sm" onclick="proxyAction(${p.id},'start')"><i class="fas fa-play"></i></button>`;

                let liveSummaryHtml = '';
                if (isTelemt && running && liveData[p.id] && liveData[p.id].supported && liveData[p.id].summary) {
                    const s = liveData[p.id].summary;
                    liveSummaryHtml = `
                        <div><div class="stat-label">${t('stat_connections')}</div><div class="font-bold">${s.current_connections || 0}</div></div>
                        <div><div class="stat-label">${t('stat_total_conns')}</div><div class="font-bold">${s.connections_total || 0}</div></div>
                        <div><div class="stat-label">${t('stat_uptime')}</div><div class="font-bold">${formatUptime(s.uptime_seconds || 0)}</div></div>`;
                }

                html += `<div class="card">
                    <div class="flex items-center justify-between mb-4">
                        <div class="flex items-center gap-3">
                            <i class="fas fa-server text-xl" style="color:${running?'var(--success)':'var(--danger)'}"></i>
                            <div>
                                <h3 class="font-bold text-lg">${esc(p.name)}</h3>
                                <span class="text-sm" style="color:var(--text-secondary)">Port: ${p.port} | ${esc(p.fake_tls_domain)} | ${engineBadge} | ${badge}${p.ad_tag ? ' | <i class="fas fa-ad"></i> AD' : ''}</span>
                                ${isTelemt && running ? ` <span class="live-badge"><i class="fas fa-chart-bar"></i> ${t('live_stats_badge')}</span>` : ''}
                            </div>
                        </div>
                        <div class="flex gap-2">
                            ${controls}
                            <button class="btn btn-outline btn-sm" onclick="showEditModal(${p.id})" title="${t('btn_edit')}"><i class="fas fa-pen"></i></button>
                            <button class="btn btn-outline btn-sm" onclick="showLogs(${p.id})"><i class="fas fa-file-alt"></i></button>
                            <button class="btn btn-danger btn-sm" onclick="deleteProxy(${p.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="grid grid-3 section-divider">
                        <div><div class="stat-label">${t('stat_upload')}</div><div class="font-bold">${formatBytes(p.traffic_up)}</div></div>
                        <div><div class="stat-label">${t('stat_download')}</div><div class="font-bold">${formatBytes(p.traffic_down)}</div></div>
                        <div><div class="stat-label">${t('stat_total')}</div><div class="font-bold">${formatBytes(p.traffic_up + p.traffic_down)}</div></div>
                    </div>
                    ${liveSummaryHtml ? `<div class="grid grid-3 section-divider">${liveSummaryHtml}</div>` : ''}
                    <div class="section-divider">
                        <div class="flex items-center justify-between" style="cursor:pointer" onclick="toggleClients(${p.id})">
                            <h4 class="font-bold"><i class="fas fa-chevron-${openSections.has(p.id)?'down':'right'}" id="chevron-${p.id}" style="width:14px;margin-right:6px;font-size:12px"></i>${t('clients_count', {count: p.client_count})}</h4>
                            <button class="btn btn-outline btn-sm" onclick="showAddClientModal(${p.id}); event.stopPropagation()"><i class="fas fa-plus mr-1"></i>${t('btn_add_client')}</button>
                        </div>
                        <div id="clients-wrap-${p.id}" style="display:${openSections.has(p.id)?'block':'none'}; margin-top:12px">
                            <div id="clients-${p.id}">${clientCache[p.id] || (initialized ? '' : `<p class="text-sm" style="color:var(--text-secondary)">${t('loading')}</p>`)}</div>
                        </div>
                    </div>
                </div>`;
            }
            el.innerHTML = html;
            for (const p of proxies) {
                proxyMeta[p.id] = { backend: p.backend, running: p.status.running };
                proxyData[p.id] = p;
                loadClients(p.id, p.backend, p.status.running);
            }
            initialized = true;
        } catch (e) { console.error(e); }
    }

    async function loadClients(proxyId, backend, running) {
        try {
            const clients = await api(`/api/proxies/${proxyId}/clients`);
            const el = document.getElementById(`clients-${proxyId}`);
            if (clients.length === 0) { const h = `<p class="text-sm" style="color:var(--text-secondary)">${t('no_clients')}</p>`; clientCache[proxyId] = h; el.innerHTML = h; return; }

            const isTelemt = backend === 'telemt';
            const live = (isTelemt && running && liveData[proxyId] && liveData[proxyId].users) ? liveData[proxyId].users : [];
            const liveMap = {};
            for (const u of live) { liveMap[u.client_id] = u; }

            let html = '';
            for (const c of clients) {
                const badge = c.enabled
                    ? `<span class="badge badge-success">${t('client_active')}</span>`
                    : `<span class="badge badge-danger">${t('client_disabled')}</span>`;

                const totalTraffic = c.traffic_up + c.traffic_down;
                const trafficText = formatBytes(totalTraffic) + (c.traffic_limit > 0 ? ' / ' + formatBytes(c.traffic_limit) : '');
                const limitText = c.traffic_limit > 0 ? '' : `<div style="color:var(--text-secondary);font-size:11px">${t('traffic_no_limit')}</div>`;

                let progressHtml = '';
                if (c.traffic_limit > 0) {
                    const pct = Math.min(100, Math.round(totalTraffic / c.traffic_limit * 100));
                    const color = pct >= 90 ? 'var(--danger)' : pct >= 70 ? 'var(--warning)' : 'var(--success)';
                    progressHtml = `<div class="progress-bar"><div class="progress-bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
                }

                // Live stats (telemt only)
                let liveStatsHtml = '';
                if (isTelemt) {
                    const u = liveMap[c.id];
                    const isOnline = u && u.current_connections > 0;
                    const dot = isOnline ? '<span class="live-dot online"></span>' : '<span class="live-dot offline"></span>';
                    const onlineText = isOnline ? t('client_online') : t('client_offline');
                    const conns = u ? u.current_connections : 0;
                    const ips = u ? u.active_unique_ips : 0;
                    const ipList = (u && u.active_ips && u.active_ips.length) ? `<div style="font-size:11px;color:var(--text-secondary)">${u.active_ips.join(', ')}</div>` : '';

                    liveStatsHtml = `
                        <div class="client-card-stat">
                            <div class="stat-label">${t('client_online_label')}</div>
                            <div class="stat-value-sm">${dot} ${onlineText}</div>
                        </div>
                        <div class="client-card-stat">
                            <div class="stat-label">${t('client_connections_label')}</div>
                            <div class="stat-value-sm">${conns}<span class="traffic-pct">${ips} IP</span></div>
                            ${ipList}
                        </div>`;
                }

                const gridClass = isTelemt ? 'client-card-grid grid-4' : 'client-card-grid';

                html += `<div class="client-card">
                    <div class="client-card-header">
                        <div class="flex items-center gap-2">
                            <span class="font-medium">${esc(c.name)}</span>
                            ${badge}
                        </div>
                        <div class="flex gap-2">
                            <button class="btn btn-outline btn-sm" onclick="showEditClientModal(${proxyId},${c.id})" title="${t('btn_edit')}"><i class="fas fa-pen"></i></button>
                            <button class="btn btn-outline btn-sm" onclick="toggleClient(${proxyId},${c.id},${!c.enabled})" title="${c.enabled ? t('toast_disabled') : t('toast_enabled')}"><i class="fas fa-${c.enabled?'pause':'play'}"></i></button>
                            <button class="btn btn-danger btn-sm" onclick="deleteClient(${proxyId},${c.id})" title="${t('toast_deleted')}"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>

                    <div class="client-card-secret">
                        <code onclick="copyToClipboard('${esc(c.secret)}')" title="${t('click_to_copy')}">${esc(c.secret)}</code>
                        <button class="btn btn-outline btn-sm" onclick="copyToClipboard('${esc(c.secret)}')"><i class="fas fa-copy"></i></button>
                    </div>

                    <div class="${gridClass}">
                        <div class="client-card-stat">
                            <div class="stat-label">${t('client_traffic_label')}</div>
                            <div class="stat-value-sm">${trafficText}</div>
                            ${limitText}
                            ${progressHtml}
                        </div>
                        <div class="client-card-stat">
                            <div class="stat-label">${t('client_expiry_label')}</div>
                            <div class="stat-value-sm">${formatExpiry(c.expiry_time)}</div>
                        </div>
                        ${liveStatsHtml}
                    </div>

                    <div class="client-card-actions">
                        <button class="btn btn-outline btn-sm" onclick="copyToClipboard('${esc(c.tg_link)}')"><i class="fas fa-link mr-1"></i>${t('btn_copy_link')}</button>
                        <button class="btn btn-outline btn-sm" onclick="resetTraffic(${proxyId},${c.id})"><i class="fas fa-undo mr-1"></i>${t('btn_reset_traffic')}</button>
                    </div>
                </div>`;
            }
            clientCache[proxyId] = html;
            el.innerHTML = html;
        } catch (e) { console.error(e); }
    }

    async function fetchLiveData() {
        for (const [id, meta] of Object.entries(proxyMeta)) {
            if (meta.backend === 'telemt' && meta.running) {
                try {
                    liveData[id] = await api(`/api/proxies/${id}/live`);
                } catch (e) { /* telemt not ready yet */ }
            }
        }
    }

    function showCreateModal() {
        api('/api/settings').then(s => {
            const def = s.proxy_backend || 'official';
            document.getElementById('proxyBackend').value = def;
            document.querySelectorAll('.engine-btn').forEach(b => {
                b.classList.toggle('active', b.dataset.engine === def);
            });
        }).catch(() => {});
        applyI18n();
        document.getElementById('createModal').classList.add('active');
    }
    function showAddClientModal(id) {
        document.getElementById('clientProxyId').value = id;
        applyI18n();
        document.getElementById('addClientModal').classList.add('active');
    }
    function hideModal(id) { document.getElementById(id).classList.remove('active'); }

    async function createProxy() {
        try {
            await api('/api/proxies', { method: 'POST', body: JSON.stringify({
                name: document.getElementById('proxyName').value,
                port: parseInt(document.getElementById('proxyPort').value),
                fake_tls_domain: document.getElementById('proxyDomain').value,
                ad_tag: document.getElementById('proxyAdTag').value,
                backend: document.getElementById('proxyBackend').value,
            })});
            hideModal('createModal'); toast(t('toast_proxy_created')); loadProxies();
        } catch (e) { toast(e.message, 'error'); }
    }

    function showEditModal(id) {
        const p = proxyData[id];
        if (!p) return;
        document.getElementById('editProxyId').value = p.id;
        document.getElementById('editProxyName').value = p.name;
        document.getElementById('editProxyPort').value = p.port;
        document.getElementById('editProxyDomain').value = p.fake_tls_domain;
        document.getElementById('editProxyAdTag').value = p.ad_tag || '';
        document.getElementById('editProxyTrafficLimit').value = p.traffic_total_limit || 0;
        applyI18n();
        document.getElementById('editModal').classList.add('active');
    }

    async function saveProxy() {
        const id = document.getElementById('editProxyId').value;
        try {
            await api(`/api/proxies/${id}`, { method: 'PUT', body: JSON.stringify({
                name: document.getElementById('editProxyName').value,
                port: parseInt(document.getElementById('editProxyPort').value),
                fake_tls_domain: document.getElementById('editProxyDomain').value,
                ad_tag: document.getElementById('editProxyAdTag').value,
                traffic_total_limit: parseInt(document.getElementById('editProxyTrafficLimit').value),
            })});
            hideModal('editModal'); toast(t('toast_proxy_saved')); loadProxies();
        } catch (e) { toast(e.message, 'error'); }
    }

    let actionInProgress = false;

    async function deleteProxy(id) {
        if (actionInProgress || !confirm(t('confirm_delete_proxy'))) return;
        actionInProgress = true;
        setCardLoading(id, true);
        try {
            await api(`/api/proxies/${id}`, { method: 'DELETE' });
            toast(t('toast_proxy_deleted'));
            delete proxyData[id]; delete proxyMeta[id]; delete clientCache[id];
            await loadProxies();
        } catch (e) { toast(e.message, 'error'); }
        actionInProgress = false;
    }
    const proxyActionToast = { start: 'toast_proxy_started', stop: 'toast_proxy_stopped', restart: 'toast_proxy_restarted' };
    async function proxyAction(id, action) {
        if (actionInProgress) return;
        actionInProgress = true;
        setCardLoading(id, true);
        try {
            await api(`/api/proxies/${id}/${action}`, { method: 'POST' });
            toast(t(proxyActionToast[action]));
            await loadProxies();
        } catch (e) { toast(e.message, 'error'); setCardLoading(id, false); }
        actionInProgress = false;
    }

    function setCardLoading(id, loading) {
        const cards = document.querySelectorAll('.card');
        for (const card of cards) {
            const btns = card.querySelectorAll('button');
            for (const b of btns) {
                const onclick = b.getAttribute('onclick') || '';
                if (onclick.includes(`(${id}`) || onclick.includes(`(${id},`)) {
                    if (loading) {
                        card.style.opacity = '0.5';
                        card.style.pointerEvents = 'none';
                    } else {
                        card.style.opacity = '';
                        card.style.pointerEvents = '';
                    }
                    return;
                }
            }
        }
    }
    async function showLogs(id) { try { const d = await api(`/api/proxies/${id}/logs?tail=100`); document.getElementById('logsContent').textContent = d.logs || t('no_logs'); document.getElementById('logsModal').classList.add('active'); } catch (e) { toast(e.message, 'error'); } }

    async function addClient() {
        const proxyId = document.getElementById('clientProxyId').value;
        const trafficGb = parseFloat(document.getElementById('clientTrafficLimit').value) || 0;
        const expiryDays = parseInt(document.getElementById('clientExpiry').value) || 0;
        const trafficBytes = trafficGb > 0 ? Math.round(trafficGb * 1024 * 1024 * 1024) : 0;
        const expiryUnix = expiryDays > 0 ? Math.floor(Date.now() / 1000) + expiryDays * 86400 : 0;
        try {
            await api(`/api/proxies/${proxyId}/clients`, { method: 'POST', body: JSON.stringify({
                name: document.getElementById('clientName').value,
                traffic_limit: trafficBytes,
                expiry_time: expiryUnix,
            })});
            hideModal('addClientModal'); toast(t('toast_client_added')); loadProxies();
        } catch (e) { toast(e.message, 'error'); }
    }

    async function showEditClientModal(proxyId, clientId) {
        try {
            const clients = await api(`/api/proxies/${proxyId}/clients`);
            const c = clients.find(x => x.id === clientId);
            if (!c) { toast('Client not found', 'error'); return; }
            document.getElementById('editClientProxyId').value = proxyId;
            document.getElementById('editClientId').value = clientId;
            document.getElementById('editClientName').value = c.name;
            document.getElementById('editClientTrafficLimitOrigBytes').value = c.traffic_limit || 0;
            document.getElementById('editClientTrafficLimit').value = c.traffic_limit > 0 ? parseFloat((c.traffic_limit / 1024 / 1024 / 1024).toFixed(2)) : 0;
            document.getElementById('editClientExpiry').value = 0;
            const info = document.getElementById('editClientExpiryInfo');
            if (c.expiry_time > 0) {
                const d = new Date(c.expiry_time * 1000);
                const now = Math.floor(Date.now() / 1000);
                if (c.expiry_time < now) {
                    info.innerHTML = `<span style="color:var(--danger)">${t('expiry_expired')}</span>`;
                } else {
                    const daysLeft = Math.ceil((c.expiry_time - now) / 86400);
                    info.textContent = t('expiry_until', {date: d.toLocaleDateString()}) + ` (${daysLeft}d)`;
                }
            } else {
                info.textContent = t('expiry_permanent');
            }
            applyI18n();
            document.getElementById('editClientModal').classList.add('active');
        } catch (e) { toast(e.message, 'error'); }
    }

    async function saveClient() {
        const proxyId = document.getElementById('editClientProxyId').value;
        const clientId = document.getElementById('editClientId').value;
        const trafficGb = parseFloat(document.getElementById('editClientTrafficLimit').value) || 0;
        const expiryDays = parseInt(document.getElementById('editClientExpiry').value) || 0;
        const origBytes = parseInt(document.getElementById('editClientTrafficLimitOrigBytes').value) || 0;
        const origGb = parseFloat((origBytes / 1024 / 1024 / 1024).toFixed(2));

        // Use original bytes if user didn't change the GB value (avoids rounding drift)
        const trafficBytes = (trafficGb === origGb) ? origBytes : (trafficGb > 0 ? Math.round(trafficGb * 1024 * 1024 * 1024) : 0);

        const updates = {
            name: document.getElementById('editClientName').value,
            traffic_limit: trafficBytes,
        };
        // Expiry: 0 = don't change; >0 = set new expiry from now; -1 = remove expiry (permanent)
        if (expiryDays > 0) {
            updates.expiry_time = Math.floor(Date.now() / 1000) + expiryDays * 86400;
        } else if (expiryDays < 0) {
            updates.expiry_time = 0;
        }

        try {
            await api(`/api/proxies/${proxyId}/clients/${clientId}`, { method: 'PUT', body: JSON.stringify(updates) });
            hideModal('editClientModal'); toast(t('toast_client_saved')); const m = proxyMeta[proxyId]||{}; loadClients(proxyId, m.backend, m.running);
        } catch (e) { toast(e.message, 'error'); }
    }

    async function toggleClient(pid, cid, enable) { try { await api(`/api/proxies/${pid}/clients/${cid}`, { method: 'PUT', body: JSON.stringify({ enabled: enable }) }); toast(enable ? t('toast_enabled') : t('toast_disabled')); const m = proxyMeta[pid]||{}; loadClients(pid, m.backend, m.running); } catch (e) { toast(e.message, 'error'); } }
    async function resetTraffic(pid, cid) { try { await api(`/api/proxies/${pid}/clients/${cid}/reset-traffic`, { method: 'POST' }); toast(t('toast_traffic_reset')); const m = proxyMeta[pid]||{}; loadClients(pid, m.backend, m.running); } catch (e) { toast(e.message, 'error'); } }
    async function deleteClient(pid, cid) { if (!confirm(t('confirm_delete_client'))) return; try { await api(`/api/proxies/${pid}/clients/${cid}`, { method: 'DELETE' }); toast(t('toast_deleted')); const m = proxyMeta[pid]||{}; loadClients(pid, m.backend, m.running); } catch (e) { toast(e.message, 'error'); } }

    async function refresh() { await fetchLiveData(); await loadProxies(); }
    refresh();
    setInterval(refresh, 10000);
    </script>
</body>
</html>
