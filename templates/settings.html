{{define "settings.html"}}
<!DOCTYPE html>
<html lang="en" data-i18n-title="page_title_settings">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings — MTProxy Panel</title>
    <link href="/static/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        .backend-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
        @media (max-width: 768px) { .backend-cards { grid-template-columns: 1fr; } }
        .backend-card {
            background: var(--bg-primary); border: 2px solid var(--border);
            border-radius: 12px; padding: 20px; cursor: pointer; transition: all .2s;
            position: relative;
        }
        .backend-card:hover { border-color: var(--accent); }
        .backend-card.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,.2); }
        .backend-card .check-mark {
            position: absolute; top: 12px; right: 12px; width: 24px; height: 24px;
            border-radius: 50%; background: var(--accent); color: white;
            display: none; align-items: center; justify-content: center; font-size: 12px;
        }
        .backend-card.active .check-mark { display: flex; }
        .backend-card h4 { font-size: 18px; font-weight: 700; margin-bottom: 4px; }
        .backend-lang { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-bottom: 8px; }
        .lang-c { background: rgba(59,130,246,.15); color: var(--accent); }
        .lang-rust { background: rgba(239,119,68,.15); color: #ef7744; }
        .backend-desc { color: var(--text-secondary); font-size: 13px; margin-bottom: 12px; line-height: 1.5; }
        .backend-image { font-size: 12px; color: var(--text-secondary); margin-bottom: 12px; }
        .backend-image code { font-size: 11px; }
        .feature-list { list-style: none; padding: 0; margin: 0; }
        .feature-list li { padding: 4px 0; font-size: 13px; display: flex; align-items: center; gap: 8px; }
        .feature-list .yes { color: var(--success); }
        .feature-list .no { color: var(--text-secondary); opacity: 0.5; }
        .feature-icon { width: 16px; text-align: center; }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>

    <div class="sidebar">
        <div class="sidebar-brand"><i class="fas fa-paper-plane"></i><div><div class="name" data-i18n="app_name"></div><div class="ver">v1.2.0</div></div></div>
        <nav>
            <a href="/panel"><i class="fas fa-chart-line"></i> <span data-i18n="nav_dashboard"></span></a>
            <a href="/panel/proxies"><i class="fas fa-server"></i> <span data-i18n="nav_proxies"></span></a>
            <a href="/panel/settings" class="active"><i class="fas fa-cog"></i> <span data-i18n="nav_settings"></span></a>
        </nav>
        <div class="sidebar-footer">
            <div class="lang-switcher">
                <button onclick="setLang('en')" class="lang-btn" data-lang="en">EN</button>
                <button onclick="setLang('ru')" class="lang-btn" data-lang="ru">RU</button>
                <button onclick="setLang('zh')" class="lang-btn" data-lang="zh">ZH</button>
            </div>
            <a href="#" onclick="logout()"><i class="fas fa-sign-out-alt mr-2"></i><span data-i18n="btn_logout"></span></a>
        </div>
    </div>

    <div class="main">
        <h1 class="page-title" data-i18n="settings_title"></h1>
        <p class="page-sub" data-i18n="settings_subtitle"></p>

        <!-- Backend Selection -->
        <div class="card mb-6">
            <h3 class="font-bold text-lg mb-2"><i class="fas fa-microchip mr-2"></i><span data-i18n="settings_engine_title"></span></h3>
            <p class="mb-4" style="color:var(--text-secondary);font-size:13px" data-i18n="settings_engine_desc"></p>
            <div id="backendCards" class="backend-cards"></div>
            <div class="mt-4" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="saveBackend()"><i class="fas fa-save mr-1"></i> <span data-i18n="btn_apply_engine"></span></button>
                <button class="btn btn-outline" onclick="pullImage()"><i class="fas fa-download mr-1"></i> <span data-i18n="btn_pull_image"></span></button>
                <span id="backendStatus" style="color:var(--text-secondary);font-size:13px"></span>
                <span id="pullStatus" style="color:var(--text-secondary);font-size:13px"></span>
            </div>
        </div>

        <!-- Change Password -->
        <div class="card mb-6">
            <h3 class="font-bold text-lg mb-4"><i class="fas fa-lock mr-2"></i><span data-i18n="settings_password_title"></span></h3>
            <div class="grid grid-2">
                <div><label data-i18n="label_current_password"></label><input type="password" id="oldPassword"></div>
                <div><label data-i18n="label_new_password"></label><input type="password" id="newPassword"></div>
            </div>
            <button class="btn btn-primary mt-4" onclick="changePassword()"><i class="fas fa-save mr-1"></i> <span data-i18n="btn_update_password"></span></button>
        </div>

        <!-- SSL / Domain -->
        <div class="card mb-6">
            <h3 class="font-bold text-lg mb-4"><i class="fas fa-shield-alt mr-2"></i><span data-i18n="settings_ssl_title"></span></h3>

            <!-- Option 1: Let's Encrypt -->
            <p class="font-medium mb-2" data-i18n="ssl_option_letsencrypt"></p>
            <p class="mb-3" style="color:var(--text-secondary);font-size:13px" data-i18n-html="settings_ssl_desc"></p>
            <div class="grid grid-2">
                <div><label data-i18n="label_panel_domain"></label><input type="text" id="setting-panel_domain" data-i18n-placeholder="placeholder_panel_domain"></div>
            </div>
            <button class="btn btn-primary mt-4" onclick="saveSettings()"><i class="fas fa-save mr-1"></i> <span data-i18n="btn_save_restart"></span></button>

            <!-- Divider -->
            <div class="section-divider mt-4">
                <!-- Option 2: Custom certificate -->
                <p class="font-medium mb-2" data-i18n="ssl_option_custom"></p>
                <p class="mb-3" style="color:var(--text-secondary);font-size:13px" data-i18n="ssl_custom_desc"></p>

                <div id="certInfo" style="display:none" class="mb-3">
                    <div style="background:var(--bg-primary);border-radius:8px;padding:12px;font-size:13px">
                        <div id="certDetails"></div>
                    </div>
                </div>

                <div class="grid grid-2 mb-3">
                    <div>
                        <label data-i18n="label_cert_file"></label>
                        <input type="file" id="certFile" accept=".pem,.crt,.cer" style="padding:6px">
                    </div>
                    <div>
                        <label data-i18n="label_key_file"></label>
                        <input type="file" id="keyFile" accept=".pem,.key" style="padding:6px">
                    </div>
                </div>
                <div style="display:flex;align-items:center;gap:12px">
                    <button class="btn btn-primary" onclick="uploadCert()"><i class="fas fa-upload mr-1"></i> <span data-i18n="btn_upload_cert"></span></button>
                    <button class="btn btn-danger" id="deleteCertBtn" style="display:none" onclick="deleteCert()"><i class="fas fa-trash mr-1"></i> <span data-i18n="btn_delete_cert"></span></button>
                    <span id="certStatus" style="color:var(--text-secondary);font-size:13px"></span>
                </div>
            </div>
        </div>

        <!-- Panel Settings -->
        <div class="card mb-6">
            <h3 class="font-bold text-lg mb-4"><i class="fas fa-sliders-h mr-2"></i><span data-i18n="settings_panel_title"></span></h3>
            <div class="grid grid-2">
                <div><label data-i18n="label_server_ip"></label><input type="text" id="setting-server_ip" data-i18n-placeholder="placeholder_server_ip"></div>
            </div>
            <button class="btn btn-primary mt-4" onclick="saveSettings()"><i class="fas fa-save mr-1"></i> <span data-i18n="btn_save_settings"></span></button>
        </div>

        <!-- Telegram Bot -->
        <div class="card mb-6">
            <h3 class="font-bold text-lg mb-4"><i class="fab fa-telegram mr-2"></i><span data-i18n="settings_bot_title"></span></h3>
            <p class="mb-3" style="color:var(--text-secondary);font-size:13px" data-i18n-html="settings_bot_desc"></p>
            <div class="grid grid-2">
                <div><label data-i18n="label_bot_token"></label><input type="text" id="setting-tg_bot_token" data-i18n-placeholder="placeholder_bot_token"></div>
                <div><label data-i18n="label_admin_ids"></label><input type="text" id="setting-tg_admin_ids" data-i18n-placeholder="placeholder_admin_ids"></div>
            </div>
            <div class="mt-4" style="display:flex;align-items:center;gap:12px;">
                <button class="btn btn-primary" onclick="saveBotSettings()"><i class="fas fa-save mr-1"></i> <span data-i18n="btn_save"></span></button>
                <button class="btn btn-outline" id="botStartBtn" onclick="toggleBot()"><i class="fas fa-play mr-1"></i> <span data-i18n="btn_start_bot"></span></button>
                <span id="botStatus" style="font-size:13px;color:var(--text-secondary)"></span>
            </div>
        </div>

        <!-- About -->
        <div class="card">
            <h3 class="font-bold text-lg mb-2"><i class="fas fa-info-circle mr-2"></i><span data-i18n="settings_about_title"></span></h3>
            <p style="color:var(--text-secondary)" data-i18n-html="settings_about_text"></p>
        </div>
    </div>

    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/app.js"></script>
    <script>
    applyI18n();
    let selectedBackend = 'official';

    function onLangChange() { applyI18n(); loadBackends(); loadBotStatus(); }

    async function loadBackends() {
        try {
            const backends = await api('/api/backends');
            const container = document.getElementById('backendCards');
            container.innerHTML = '';
            backends.forEach(b => {
                if (b.active) selectedBackend = b.id;
                const card = document.createElement('div');
                card.className = 'backend-card' + (b.active ? ' active' : '');
                card.dataset.id = b.id;
                card.onclick = () => selectBackend(b.id);

                const langClass = b.lang === 'C' ? 'lang-c' : 'lang-rust';
                let featuresHTML = '';
                b.features.forEach(f => {
                    const cls = f.supported ? 'yes' : 'no';
                    const icon = f.supported ? 'fa-check' : 'fa-times';
                    featuresHTML += `<li class="${cls}"><span class="feature-icon"><i class="fas ${icon}"></i></span>${t(f.name)}</li>`;
                });

                card.innerHTML = `
                    <div class="check-mark"><i class="fas fa-check"></i></div>
                    <h4>${b.name}</h4>
                    <span class="backend-lang ${langClass}">${b.lang}</span>
                    <p class="backend-desc">${t(b.description)}</p>
                    <div class="backend-image">Docker: <code>${b.image}</code></div>
                    <ul class="feature-list">${featuresHTML}</ul>
                `;
                container.appendChild(card);
            });
        } catch (e) { console.error(e); }
    }

    function selectBackend(id) {
        selectedBackend = id;
        document.querySelectorAll('.backend-card').forEach(c => {
            c.classList.toggle('active', c.dataset.id === id);
        });
    }

    async function saveBackend() {
        const status = document.getElementById('backendStatus');
        try {
            await api('/api/settings', { method: 'POST', body: JSON.stringify({ proxy_backend: selectedBackend }) });
            status.textContent = t('saved_status');
            toast(t('toast_engine_saved'));
            setTimeout(() => status.textContent = '', 3000);
        } catch (e) { toast(e.message, 'error'); }
    }

    async function loadSettings() {
        try {
            const s = await api('/api/settings');
            for (const [k, v] of Object.entries(s)) {
                const el = document.getElementById(`setting-${k}`);
                if (el) el.value = v;
            }
        } catch (e) { console.error(e); }
    }

    async function saveSettings() {
        const data = {};
        document.querySelectorAll('[id^="setting-"]').forEach(el => {
            data[el.id.replace('setting-', '')] = el.value;
        });
        try { await api('/api/settings', { method: 'POST', body: JSON.stringify(data) }); toast(t('toast_settings_saved')); } catch (e) { toast(e.message, 'error'); }
    }

    async function changePassword() {
        try {
            await api('/api/change-password', { method: 'POST', body: JSON.stringify({
                old_password: document.getElementById('oldPassword').value,
                new_password: document.getElementById('newPassword').value,
            })});
            toast(t('toast_password_updated'));
            document.getElementById('oldPassword').value = '';
            document.getElementById('newPassword').value = '';
        } catch (e) { toast(e.message, 'error'); }
    }

    async function pullImage() {
        const s = document.getElementById('pullStatus');
        s.textContent = t('pulling_status');
        try { await api('/api/pull-image', { method: 'POST' }); s.textContent = t('pull_done_status'); toast(t('toast_image_pulled')); } catch (e) { s.textContent = t('pull_failed_status'); toast(e.message, 'error'); }
    }

    async function saveBotSettings() {
        const data = {
            tg_bot_token: document.getElementById('setting-tg_bot_token').value,
            tg_admin_ids: document.getElementById('setting-tg_admin_ids').value,
        };
        try {
            await api('/api/settings', { method: 'POST', body: JSON.stringify(data) });
            toast(t('toast_bot_settings_saved'));
        } catch (e) { toast(e.message, 'error'); }
    }

    async function toggleBot() {
        try {
            const res = await api('/api/bot/status');
            if (res.running) {
                await api('/api/bot/stop', { method: 'POST' });
                toast(t('toast_bot_stopped'));
            } else {
                await api('/api/bot/start', { method: 'POST' });
                toast(t('toast_bot_started'));
            }
            setTimeout(loadBotStatus, 500);
        } catch (e) { toast(e.message, 'error'); }
    }

    async function loadBotStatus() {
        const btn = document.getElementById('botStartBtn');
        const status = document.getElementById('botStatus');
        try {
            const res = await api('/api/bot/status');
            if (res.running) {
                btn.innerHTML = `<i class="fas fa-stop mr-1"></i> ${t('btn_stop_bot')}`;
                btn.className = 'btn btn-outline';
                btn.style.borderColor = 'var(--danger)';
                btn.style.color = 'var(--danger)';
                status.innerHTML = `<span style="color:var(--success)">${t('bot_status_running')}</span>`;
            } else {
                btn.innerHTML = `<i class="fas fa-play mr-1"></i> ${t('btn_start_bot')}`;
                btn.className = 'btn btn-outline';
                btn.style.borderColor = '';
                btn.style.color = '';
                status.innerHTML = res.error ? `<span style="color:var(--danger)">${res.error}</span>` : t('bot_status_stopped');
            }
        } catch (e) {
            status.textContent = t('bot_status_unknown');
        }
    }

    async function loadCertInfo() {
        try {
            const info = await api('/api/cert-info');
            const el = document.getElementById('certInfo');
            const details = document.getElementById('certDetails');
            const delBtn = document.getElementById('deleteCertBtn');
            if (info.installed) {
                el.style.display = 'block';
                delBtn.style.display = '';
                if (info.error) {
                    details.innerHTML = `<span style="color:var(--danger)">⚠ ${info.error}</span>`;
                } else {
                    const expired = info.expired ? ' <span style="color:var(--danger)">(expired!)</span>' : '';
                    details.innerHTML = `
                        ✅ <b>${t('ssl_cert_installed')}</b><br>
                        ${t('ssl_cert_domains')}: <b>${(info.domains||[]).join(', ')}</b><br>
                        ${t('ssl_cert_issuer')}: ${info.issuer}<br>
                        ${t('ssl_cert_valid')}: ${info.not_before} — ${info.not_after}${expired}`;
                }
            } else {
                el.style.display = 'none';
                delBtn.style.display = 'none';
            }
        } catch (e) { console.error(e); }
    }

    async function uploadCert() {
        const certInput = document.getElementById('certFile');
        const keyInput = document.getElementById('keyFile');
        if (!certInput.files.length || !keyInput.files.length) {
            toast(t('ssl_select_files'), 'error'); return;
        }
        const form = new FormData();
        form.append('cert', certInput.files[0]);
        form.append('key', keyInput.files[0]);
        const status = document.getElementById('certStatus');
        try {
            const res = await fetch('/api/upload-cert', {
                method: 'POST', body: form,
                credentials: 'include',
                headers: { 'X-CSRF-Token': getCsrfToken() },
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.detail || 'Upload failed');
            toast(t('ssl_cert_uploaded'));
            status.textContent = t('ssl_restart_needed');
            status.style.color = 'var(--warning)';
            loadCertInfo();
        } catch (e) { toast(e.message, 'error'); }
    }

    async function deleteCert() {
        if (!confirm(t('ssl_confirm_delete'))) return;
        try {
            await api('/api/custom-cert', { method: 'DELETE' });
            toast(t('ssl_cert_deleted'));
            loadCertInfo();
        } catch (e) { toast(e.message, 'error'); }
    }

    loadBackends();
    loadSettings();
    loadBotStatus();
    loadCertInfo();
    </script>
</body>
</html>
{{end}}
