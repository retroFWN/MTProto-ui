version: "3.8"

services:
  panel:
    build: .
    container_name: mtproxy-panel
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "80:80"    # ACME challenges (auto-SSL)
      - "443:443"  # HTTPS (auto-SSL)
    volumes:
      - panel-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PANEL_PORT=8080
      - PANEL_HOST=0.0.0.0
      - DOCKER_HOST_IP=host.docker.internal
      # - PANEL_DOMAIN=panel.example.com  # uncomment to enable auto-SSL
    networks:
      - mtproxy-net

volumes:
  panel-data:

networks:
  mtproxy-net:
    driver: bridge
