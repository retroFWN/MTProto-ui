services:
  panel:
    build: .
    container_name: mtproxy-panel
    restart: unless-stopped
    ports:
      - "8080:8080"
      # Порты 80/443 раскомментировать только при включении PANEL_DOMAIN (auto-SSL)
      # - "80:80"
      # - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/"]
      interval: 5s
      timeout: 3s
      start_period: 300s
      retries: 3
    environment:
      - PANEL_PORT=8080
      - PANEL_HOST=0.0.0.0
      - DOCKER_HOST_IP=host.docker.internal
      - DATA_HOST_PATH=${PWD}/data
      # - PANEL_DOMAIN=panel.example.com  # uncomment to enable auto-SSL

networks:
  default:
    driver: bridge
