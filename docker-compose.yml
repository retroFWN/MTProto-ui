version: "3.8"

services:
  panel:
    build: .
    container_name: mtproxy-panel
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - panel-data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PANEL_PORT=8080
      - PANEL_HOST=0.0.0.0
    networks:
      - mtproxy-net

volumes:
  panel-data:

networks:
  mtproxy-net:
    driver: bridge
